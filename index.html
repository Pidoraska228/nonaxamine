<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nonaxamine — Поиск и просмотр аниме</title>
    
    <!-- Подключаем библиотеку Hls.js для воспроизведения потокового видео .m3u8 -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    
    <!-- Подключаем наш внешний скрипт, который мы создадим на Шаге 2 -->
    <script src="app.js" defer></script>

    <style>
        :root {
            --nx-bg-dark: #07070a;
            --nx-card-bg: #0d0d14;
            --nx-accent-red: #ff3333;
            --nx-accent-green: #00e676;
            --nx-text-primary: #f0f0f5;
            --nx-text-secondary: #757585;
            --nx-border-color: #1c1c2b;
        }

        body {
            background-color: var(--nx-bg-dark);
            color: var(--nx-text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Шапка сайта */
        .nx-navbar {
            width: 100%;
            background-color: var(--nx-card-bg);
            border-bottom: 1px solid var(--nx-border-color);
            padding: 15px 0;
            display: flex;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 200;
        }

        .nx-navbar-container {
            width: 1000px;
            max-width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .nx-logo {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 1.5px;
            text-decoration: none;
            color: var(--nx-text-primary);
        }

        .nx-logo span {
            color: var(--nx-accent-red);
        }

        /* Поисковая панель */
        .nx-search-box {
            display: flex;
            background: #141420;
            border: 1px solid var(--nx-border-color);
            border-radius: 8px;
            overflow: hidden;
            width: 400px;
            max-width: 100%;
        }

        .nx-search-input {
            background: none;
            border: none;
            color: #fff;
            padding: 10px 15px;
            width: 100%;
            outline: none;
            font-size: 14px;
        }

        .nx-search-btn {
            background: var(--nx-accent-red);
            border: none;
            color: white;
            padding: 0 20px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .nx-search-btn:hover {
            background-color: #cc2424;
        }

        /* Главная разметка */
        .nx-main-layout {
            width: 1000px;
            max-width: 90%;
            padding: 30px 0;
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        /* Результаты поиска */
        .nx-results-dropdown {
            display: none;
            background: var(--nx-card-bg);
            border: 1px solid var(--nx-border-color);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .nx-results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
        }

        .nx-anime-card {
            cursor: pointer;
            text-align: center;
            transition: transform 0.2s;
        }

        .nx-anime-card:hover {
            transform: translateY(-5px);
        }

        .nx-anime-card img {
            width: 100%;
            border-radius: 8px;
            aspect-ratio: 3 / 4;
            object-fit: cover;
            border: 1px solid var(--nx-border-color);
        }

        .nx-anime-card-title {
            font-size: 12px;
            margin-top: 8px;
            font-weight: bold;
            color: var(--nx-text-primary);
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        /* Название тайтла */
        .nx-title-section {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 20px;
            align-items: center;
        }

        .nx-title-poster {
            width: 100%;
            border-radius: 8px;
            border: 1px solid var(--nx-border-color);
            aspect-ratio: 3 / 4;
            object-fit: cover;
        }

        .nx-anime-title {
            margin: 0 0 10px 0;
            font-size: 24px;
            font-weight: 800;
        }

        .nx-anime-subtitle {
            margin: 0;
            color: var(--nx-text-secondary);
            font-size: 14px;
        }

        /* Рамка плеера */
        .nx-player-box {
            position: relative;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--nx-border-color);
            aspect-ratio: 16 / 9;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }

        .nx-video {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Кнопка пропуска */
        .nx-skip-btn {
            position: absolute;
            bottom: 70px;
            right: 25px;
            background-color: rgba(255, 51, 51, 0.95);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 51, 51, 0.5);
            display: none;
            z-index: 100;
            transition: transform 0.15s, background-color 0.15s;
        }

        .nx-skip-btn:hover {
            background-color: var(--nx-accent-red);
            transform: scale(1.05);
        }

        /* Блок выбора серий (Сетка в стиле Jut.su) */
        .nx-section-box {
            background-color: var(--nx-card-bg);
            border: 1px solid var(--nx-border-color);
            border-radius: 12px;
            padding: 20px;
        }

        .nx-section-title {
            font-size: 18px;
            margin: 0 0 15px 0;
            font-weight: 700;
            border-left: 3px solid var(--nx-accent-red);
            padding-left: 10px;
        }

        .nx-episode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 12px;
            max-height: 250px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .nx-episode-btn {
            background-color: #141420;
            border: 1px solid var(--nx-border-color);
            color: var(--nx-text-primary);
            aspect-ratio: 1;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nx-episode-btn:hover {
            border-color: var(--nx-accent-red);
        }

        .nx-episode-btn.active {
            background-color: var(--nx-accent-red);
            border-color: var(--nx-accent-red);
            color: #fff;
            box-shadow: 0 4px 12px rgba(255, 51, 51, 0.3);
        }

        /* Описание аниме */
        .nx-anime-info-text {
            line-height: 1.6;
            color: var(--nx-text-secondary);
            font-size: 15px;
            margin: 0;
        }
    </style>
</head>
<body>

    <!-- Шапка с формой поиска -->
    <nav class="nx-navbar">
        <div class="nx-navbar-container">
            <a href="#" class="nx-logo">NONAX<span>AMINE</span></a>
            <div class="nx-search-box">
                <input type="text" id="search-input" class="nx-search-input" placeholder="Поиск аниме (например: Наруто)...">
                <button id="search-btn" class="nx-search-btn">Найти</button>
            </div>
        </div>
    </nav>

    <!-- Основной макет -->
    <div class="nx-main-layout">
        
        <!-- Выпадающий блок результатов поиска -->
        <div id="results-dropdown" class="nx-results-dropdown">
            <h3 class="nx-section-title" style="margin-bottom: 15px;">Результаты поиска</h3>
            <div id="results-grid" class="nx-results-grid"></div>
        </div>

        <!-- Информация о выбранном аниме -->
        <div class="nx-title-section">
            <img id="anime-poster" class="nx-title-poster" src="https://via.placeholder.com/120x160?text=Nonaxamine" alt="Постер">
            <div>
                <h2 class="nx-anime-title" id="anime-title-display">Выберите аниме через поиск</h2>
                <p class="nx-anime-subtitle" id="episode-subtitle-display">Ожидание выбора серии...</p>
            </div>
        </div>

        <!-- Видеоплеер -->
        <div class="nx-player-box">
            <video id="nonax-player" class="nx-video" controls></video>
            
            <!-- Уникальная кнопка прыжка по таймлайну -->
            <button id="nonax-skip-btn" class="nx-skip-btn">ПРОПУСТИТЬ ОПЕНИНГ</button>
        </div>

        <!-- Блок выбора серий -->
        <div class="nx-section-box">
            <h3 class="nx-section-title">Серии</h3>
            <div id="episode-list-container" class="nx-episode-grid">
                <!-- Сюда динамически добавятся кнопки серий -->
            </div>
        </div>

        <!-- Блок описания -->
        <div class="nx-section-box">
            <h3 class="nx-section-title">Описание аниме</h3>
            <p class="nx-anime-info-text" id="anime-description">
                Используйте поисковую строку в шапке сайта, чтобы найти ваше любимое аниме, загрузить серии и протестировать плеер с автоматическим пропуском опенингов без сторонней рекламы.
            </p>
        </div>

    </div>

</body>
</html>
